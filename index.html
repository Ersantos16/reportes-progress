<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Análisis Financiero - VETERINO S.A.S.</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:'Inter',sans-serif;background:#F1F5F9;}
header{background:#0F172A;color:white;padding:15px 30px;display:flex;justify-content:space-between;align-items:center;}
.tabs{display:flex;background:white;border-bottom:2px solid #E5E7EB;}
.tab{padding:15px 25px;cursor:pointer;font-weight:600;}
.tab.active{color:#2E3F6E;border-bottom:3px solid #2E3F6E;}
.container{padding:30px;max-width:1200px;margin:auto;}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;}
.card{background:white;padding:20px;border-radius:12px;box-shadow:0 10px 20px rgba(0,0,0,0.08);}
footer{background:#0F172A;color:white;text-align:center;padding:20px;}
</style>
</head>

<body>

<header>
<div>PROGRESS | Análisis Financiero - VETERINO</div>
<div id="variaciones"></div>
</header>

<div class="tabs">
<div class="tab active" onclick="tab('resumen')">Resumen</div>
<div class="tab" onclick="tab('detalle')">Detalle</div>
</div>

<div class="container">

<!-- RESUMEN -->
<div id="resumen">

<div class="grid" id="kpis"></div>

<div class="card">
<canvas id="chart1"></canvas>
</div>

<div class="card">
<canvas id="chart2"></canvas>
</div>

</div>

<!-- DETALLE -->
<div id="detalle" style="display:none;">
<div class="card">
<canvas id="chart3"></canvas>
</div>
</div>

</div>

<footer>
© 2026 PROGRESS SERVICES PROGSERV S.A.S.
</footer>

<script>

// ===== DATOS (TU BASE) =====
const meses=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];

const ventas=[99815,51731,110979,293804,66415,28404,381626,649979,365924,619432,303714,656114];
const compras=[50000,30000,70000,200000,50000,20000,250000,400000,200000,300000,150000,450000];

const resultado=ventas.map((v,i)=>v-compras[i]);

// ===== VARIACIONES =====
function calc(arr){
let r=[0];
for(let i=1;i<arr.length;i++){
r.push(((arr[i]-arr[i-1])/arr[i-1])*100);
}
return r;
}

const vV=calc(ventas);
const vC=calc(compras);
const vR=calc(resultado);

// ===== HEADER =====
document.getElementById("variaciones").innerHTML=
`Ventas ${vV[11].toFixed(0)}% | Compras ${vC[11].toFixed(0)}% | Resultado ${vR[11].toFixed(0)}%`;

// ===== KPIs =====
const totalV=ventas.reduce((a,b)=>a+b,0);
const totalC=compras.reduce((a,b)=>a+b,0);
const totalR=resultado.reduce((a,b)=>a+b,0);

document.getElementById("kpis").innerHTML=`
<div class="card"><h4>Ventas</h4><h2>$${totalV.toLocaleString()}</h2></div>
<div class="card"><h4>Compras</h4><h2>$${totalC.toLocaleString()}</h2></div>
<div class="card"><h4>Resultado</h4><h2>$${totalR.toLocaleString()}</h2></div>
<div class="card"><h4>Promedio</h4><h2>$${Math.round(totalV/12).toLocaleString()}</h2></div>
`;

// ===== CHARTS =====
new Chart(chart1,{
type:'bar',
data:{
labels:meses,
datasets:[
{label:'Ventas',data:ventas,backgroundColor:'#2E3F6E'},
{label:'Compras',data:compras,backgroundColor:'#5BFF7A'}
]
}
});

new Chart(chart2,{
type:'line',
data:{
labels:meses,
datasets:[
{label:'Ventas',data:vV,borderColor:'#2E3F6E'},
{label:'Compras',data:vC,borderColor:'#5BFF7A'},
{label:'Resultado',data:vR,borderColor:'#FF6B35'}
]
}
});

new Chart(chart3,{
type:'line',
data:{
labels:meses,
datasets:[
{label:'Resultado',data:resultado,borderColor:'#5BFF7A'}
]
}
});

// ===== TABS =====
function tab(t){
document.getElementById("resumen").style.display="none";
document.getElementById("detalle").style.display="none";
document.getElementById(t).style.display="block";
}

</script>

</body>
</html>
