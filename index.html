<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Análisis Financiero - VETERINO S.A.S.</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
    --primary:#2E3F6E;
    --accent:#5BFF7A;
}

body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:#F1F5F9;
}

/* HERO */
.hero{
    background: linear-gradient(135deg, #0F172A, #1E293B);
    padding:50px 40px 120px;
}

/* HEADER */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.header-left{
    display:flex;
    align-items:center;
    gap:15px;
}

.header-left h2{
    color:white;
}

/* VARIACIONES */
.variaciones{
    display:flex;
    gap:30px;
    color:#5BFF7A;
}

/* CONTAINER */
.container{
    max-width:1100px;
    margin:auto;
    margin-top:-80px;
    padding:20px;
}

/* CARDS BASE */
.card{
    background:white;
    border-radius:12px;
    padding:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* GRID KPIs */
.grid-cards{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
    margin-bottom:20px;
}

/* CARDS RESUMEN */
.card-resumen h5{
    font-size:12px;
    color:#64748B;
    margin:0;
}

.card-resumen h3{
    margin:10px 0;
    color:#0F172A;
}

.badge{
    display:inline-block;
    margin-top:10px;
    padding:5px 10px;
    border-radius:10px;
    font-size:12px;
}

.badge.green{
    background:#DCFCE7;
    color:#166534;
}

.badge.red{
    background:#FEE2E2;
    color:#991B1B;
}

/* GRIDS */
.grid-charts{
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:20px;
}

/* FOOTER */
footer{
    background:#0F172A;
    color:white;
    text-align:center;
    padding:20px;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">

<header>

<div class="header-left">
    <img src="Progress.png" height="40">
    <h2>Análisis Financiero - VETERINO S.A.S.</h2>
</div>

<div style="display:flex;align-items:center;gap:20px;">
    <div class="variaciones">
        <div id="varVentas"></div>
        <div id="varCompras"></div>
        <div id="varResultado"></div>
    </div>
    <img src="veterino.png" height="40">
</div>

</header>

</div>

<!-- CONTENIDO -->
<div class="container">

<!-- TARJETAS DINÁMICAS -->
<div class="grid-cards" id="cardsContainer"></div>

<!-- GRÁFICOS -->
<div class="grid-charts">

<div class="card">
<h3>Ventas vs Compras</h3>
<canvas id="chartComparativo"></canvas>
</div>

<div class="card">
<h3>Variación (%)</h3>
<canvas id="chartVariacion"></canvas>
</div>

</div>

</div>

<!-- FOOTER -->
<footer>

<div style="display:flex;justify-content:center;gap:20px;margin-bottom:10px;">
    <img src="Progress.png" height="30">
    <img src="veterino.png" height="30">
</div>

© 2026 PROGRESS SERVICES PROGSERV S.A.S. Todos los derechos reservados.

</footer>

<script>

// ================= DATOS ORIGINALES =================
const meses=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];

const ventas=[99815,51731,110979,293804,66415,28404,381626,649979,365924,619432,303714,656114];
const compras=[50000,30000,70000,200000,50000,20000,250000,400000,200000,300000,150000,450000];

const resultadoMensual=ventas.map((v,i)=>v-compras[i]);

// ================= VARIACIONES =================
function calcVar(arr){
    let v=[0];
    for(let i=1;i<arr.length;i++){
        v.push(((arr[i]-arr[i-1])/arr[i-1])*100);
    }
    return v;
}

const varVentasArr=calcVar(ventas);
const varComprasArr=calcVar(compras);
const varResultadoArr=calcVar(resultadoMensual);

// ================= HEADER =================
function color(v){return v>=0?"#5BFF7A":"#ff6b6b";}

let vV=varVentasArr[11];
let vC=varComprasArr[11];
let vR=varResultadoArr[11];

document.getElementById("varVentas").innerText="Ventas "+vV.toFixed(0)+"%";
document.getElementById("varVentas").style.color=color(vV);

document.getElementById("varCompras").innerText="Compras "+vC.toFixed(0)+"%";
document.getElementById("varCompras").style.color=color(vC);

document.getElementById("varResultado").innerText="Resultado "+vR.toFixed(0)+"%";
document.getElementById("varResultado").style.color=color(vR);

// ================= TARJETAS (MISMA DATA) =================
const cardsContainer=document.getElementById("cardsContainer");

const totalVentas=ventas.reduce((a,b)=>a+b,0);
const totalCompras=compras.reduce((a,b)=>a+b,0);
const totalResultado=resultadoMensual.reduce((a,b)=>a+b,0);
const promedio=totalVentas/ventas.length;

cardsContainer.innerHTML=`
<div class="card card-resumen">
<h5>VENTAS TOTALES</h5>
<h3>$${totalVentas.toLocaleString()}</h3>
</div>

<div class="card card-resumen">
<h5>COMPRAS TOTALES</h5>
<h3>$${totalCompras.toLocaleString()}</h3>
</div>

<div class="card card-resumen">
<h5>RESULTADO</h5>
<h3>$${totalResultado.toLocaleString()}</h3>
</div>

<div class="card card-resumen">
<h5>PROMEDIO MENSUAL</h5>
<h3>$${Math.round(promedio).toLocaleString()}</h3>
</div>
`;

// ================= GRÁFICOS =================
new Chart(document.getElementById('chartComparativo'),{
    type:'bar',
    data:{
        labels:meses,
        datasets:[
            {label:'Ventas',data:ventas,backgroundColor:'#2E3F6E'},
            {label:'Compras',data:compras,backgroundColor:'#5BFF7A'}
        ]
    }
});

new Chart(document.getElementById('chartVariacion'),{
    type:'line',
    data:{
        labels:meses,
        datasets:[
            {label:'Ventas',data:varVentasArr,borderColor:'#2E3F6E'},
            {label:'Compras',data:varComprasArr,borderColor:'#5BFF7A'},
            {label:'Resultado',data:varResultadoArr,borderColor:'#FF6B35'}
        ]
    }
});

</script>

</body>
</html>
