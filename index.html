<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Análisis Financiero - VETERINO S.A.S.</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --primary:#2E3F6E;
    --accent:#5BFF7A;
    --bg:#0F172A;
    --card:#1E293B;
    --text:#E2E8F0;
}

body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:linear-gradient(135deg,#0F172A,#1E293B);
    color:var(--text);
}

header{
    display:flex;
    justify-content:space-between;
    padding:20px 40px;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:40px 20px;
}

.card{
    background:rgba(255,255,255,0.05);
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
}

select{
    padding:8px;
    border-radius:6px;
    border:none;
}

/* TABLA */
table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:10px;
}

td:nth-child(n+2){
    text-align:right;
}

</style>
</head>

<body>

<header>
<h2>Análisis Financiero - VETERINO S.A.S.</h2>

<select id="productoSelect"></select>
</header>

<div class="container">

<div class="card">
<h3>Detalle Mensual</h3>

<table>
<thead>
<tr>
<th>Mes</th>
<th>Ventas</th>
<th>Compras</th>
<th>Resultado</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

</div>

</div>

<script>

const meses=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];

// DATA POR PRODUCTO (ejemplo escalable)
const data={
"Total":{
ventas:[99815,51731,110979,293804,66415,28404,381626,649979,365924,619432,303714,656114],
compras:[50000,30000,70000,200000,50000,20000,250000,400000,200000,300000,150000,450000]
},
"Producto A":{
ventas:[50000,20000,60000,150000,30000,15000,200000,300000,150000,250000,100000,300000],
compras:[30000,15000,40000,100000,20000,10000,150000,200000,100000,150000,80000,200000]
},
"Producto B":{
ventas:[49815,31731,50979,143804,36415,13404,181626,349979,215924,369432,203714,356114],
compras:[20000,15000,30000,100000,30000,10000,100000,200000,100000,150000,70000,250000]
}
};

// SELECT
const select=document.getElementById("productoSelect");

Object.keys(data).forEach(p=>{
    let opt=document.createElement("option");
    opt.value=p;
    opt.text=p;
    select.appendChild(opt);
});

select.addEventListener("change",render);

function render(){

    let p=select.value;
    let ventas=data[p].ventas;
    let compras=data[p].compras;

    let tabla=document.getElementById("tabla");
    tabla.innerHTML="";

    for(let i=0;i<meses.length;i++){

        let res=ventas[i]-compras[i];

        tabla.innerHTML+=`
        <tr>
            <td>${meses[i]}</td>
            <td>$${ventas[i].toLocaleString()}</td>
            <td>$${compras[i].toLocaleString()}</td>
            <td style="color:${res>=0?'#5BFF7A':'#ff6b6b'}">
                $${res.toLocaleString()}
            </td>
        </tr>`;
    }
}

// INIT
render();

</script>

</body>
</html>
