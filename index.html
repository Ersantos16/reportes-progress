<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Análisis Financiero - VETERINO S.A.S.</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --primary:#2E3F6E;
    --accent:#5BFF7A;
    --bg:#0F172A;
    --card:#1E293B;
    --text:#E2E8F0;
}

body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:linear-gradient(135deg,#0F172A,#1E293B);
    color:var(--text);
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 40px;
}

.header-left{
    display:flex;
    align-items:center;
    gap:15px;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:40px 20px;
}

.card{
    background:rgba(255,255,255,0.05);
    padding:25px;
    border-radius:12px;
    margin-bottom:20px;
}

/* ESPACIO ENTRE KPI Y TABLA */
.kpis{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
    margin-bottom:40px;
}

/* TABLA PRO */
.tabla-pro{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}

.tabla-pro th{
    text-align:left;
    padding:10px;
    color:#94A3B8;
}

.tabla-pro td{
    padding:10px;
}

.tabla-pro td:nth-child(n+2){
    text-align:right;
}

.tabla-pro tr:hover{
    background:rgba(255,255,255,0.05);
}

footer{
    text-align:center;
    padding:20px;
    background:var(--primary);
}
</style>
</head>

<body>

<header>
<div class="header-left">
    <img src="Progress.png" height="40">
    <h2 style="color:white;">Análisis Financiero - VETERINO S.A.S.</h2>
</div>
</header>

<div class="container">

<!-- KPI (sin tocar diseño base) -->
<div class="kpis">
<div class="card"><h4>Ventas Totales</h4><p id="ventasTotal"></p></div>
<div class="card"><h4>Compras Totales</h4><p id="comprasTotal"></p></div>
<div class="card"><h4>Resultado</h4><p id="resultado"></p></div>
<div class="card"><h4>Promedio Ventas</h4><p id="promedio"></p></div>
</div>

<!-- TABLA -->
<div class="card">
<h2>Detalle Mensual</h2>

<table class="tabla-pro">
<thead>
<tr>
<th>Mes</th>
<th>Ventas</th>
<th>Var %</th>
<th>Compras</th>
<th>Var %</th>
<th>Resultado</th>
<th>Var %</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

</div>

</div>

<footer>
© 2026 PROGRESS SERVICES PROGSERV S.A.S.
</footer>

<script>

// DATA
const meses=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];

const ventas=[99815,51731,110979,293804,66415,28404,381626,649979,365924,619432,303714,656114];
const compras=[50000,30000,70000,200000,50000,20000,250000,400000,200000,300000,150000,450000];

// CALCULOS
const totalVentas=ventas.reduce((a,b)=>a+b,0);
const totalCompras=compras.reduce((a,b)=>a+b,0);
const resultadoTotal=totalVentas-totalCompras;
const promedio=totalVentas/ventas.length;

const resultadoMensual=ventas.map((v,i)=>v-compras[i]);

// VARIACIONES
function calcVar(arr){
    let v=[0];
    for(let i=1;i<arr.length;i++){
        v.push(((arr[i]-arr[i-1])/arr[i-1])*100);
    }
    return v;
}

const varVentas=calcVar(ventas);
const varCompras=calcVar(compras);
const varResultado=calcVar(resultadoMensual);

// KPIs
document.getElementById("ventasTotal").innerText="$"+totalVentas.toLocaleString();
document.getElementById("comprasTotal").innerText="$"+totalCompras.toLocaleString();
document.getElementById("resultado").innerText="$"+resultadoTotal.toLocaleString();
document.getElementById("promedio").innerText="$"+Math.round(promedio).toLocaleString();

// COLOR
function color(v){return v>=0 ? "#5BFF7A" : "#ff6b6b";}

// TABLA
const tabla=document.getElementById("tabla");

for(let i=0;i<meses.length;i++){

    let res=resultadoMensual[i];

    tabla.innerHTML+=`
    <tr>
        <td>${meses[i]}</td>

        <td>$${ventas[i].toLocaleString()}</td>
        <td style="color:${color(varVentas[i])}">
            ${i==0?"-":varVentas[i].toFixed(0)+"%"}
        </td>

        <td>$${compras[i].toLocaleString()}</td>
        <td style="color:${color(varCompras[i])}">
            ${i==0?"-":varCompras[i].toFixed(0)+"%"}
        </td>

        <td style="color:${res>=0?'#5BFF7A':'#ff6b6b'}">
            $${res.toLocaleString()}
        </td>

        <td style="color:${color(varResultado[i])}">
            ${i==0?"-":varResultado[i].toFixed(0)+"%"}
        </td>
    </tr>`;
}

</script>

</body>
</html>
