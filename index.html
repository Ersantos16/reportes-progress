<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Análisis Financiero - VETERINO S.A.S.</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
    --primary:#2E3F6E;
    --accent:#5BFF7A;
    --bg:#0F172A;
    --card:#1E293B;
    --text:#E2E8F0;
}

body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:linear-gradient(135deg,#0F172A,#1E293B);
    color:var(--text);
}

/* HEADER */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 40px;
    background:rgba(255,255,255,0.03);
}

.header-left{
    display:flex;
    align-items:center;
    gap:15px;
}

.header-left h1{
    color:white;
    font-size:18px;
}

/* KPI VARIACIONES */
.variaciones{
    display:flex;
    gap:30px;
}

.var-box{
    text-align:center;
}

.var-box h4{
    margin:0;
    font-size:12px;
    color:#94A3B8;
}

.var-box p{
    margin:5px 0 0;
    font-weight:bold;
}

/* CONTAINER */
.container{
    max-width:1100px;
    margin:auto;
    padding:40px 20px;
}

.card{
    background:rgba(255,255,255,0.05);
    padding:25px;
    border-radius:12px;
    margin-bottom:20px;
}

h2{color:white;}

.kpis{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
}

.kpi{
    background:rgba(255,255,255,0.05);
    padding:15px;
    border-radius:10px;
}

.kpi h4{
    margin:0;
    color:#94A3B8;
}

.kpi p{
    font-size:22px;
    font-weight:bold;
}

footer{
    text-align:center;
    padding:20px;
    background:var(--primary);
}
</style>
</head>

<body>

<header>

<div class="header-left">
    <img src="Progress.png" height="40">
    <h1>Análisis Financiero - VETERINO S.A.S.</h1>
</div>

<div class="variaciones">
    <div class="var-box">
        <h4>Ventas</h4>
        <p id="varVentas"></p>
    </div>

    <div class="var-box">
        <h4>Compras</h4>
        <p id="varCompras"></p>
    </div>

    <div class="var-box">
        <h4>Resultado</h4>
        <p id="varResultado"></p>
    </div>
</div>

</header>

<div class="container">

<!-- KPI -->
<div class="kpis">
<div class="kpi">
<h4>Ventas Totales</h4>
<p id="ventasTotal"></p>
</div>

<div class="kpi">
<h4>Compras Totales</h4>
<p id="comprasTotal"></p>
</div>

<div class="kpi">
<h4>Resultado</h4>
<p id="resultado"></p>
</div>

<div class="kpi">
<h4>Promedio Ventas</h4>
<p id="promedio"></p>
</div>
</div>

<!-- TABLA -->
<div class="card">
<h2>Detalle Mensual</h2>
<table style="width:100%">
<thead>
<tr>
<th>Mes</th>
<th>Ventas</th>
<th>Compras</th>
<th>Resultado</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>

<!-- GRÁFICOS -->
<div class="card">
<h2>Ventas vs Compras</h2>
<canvas id="chartComparativo"></canvas>
</div>

<div class="card">
<h2>Resultado Mensual</h2>
<canvas id="chartResultado"></canvas>
</div>

</div>

<footer>
© 2026 PROGRESS SERVICES PROGSERV S.A.S.
</footer>

<script>

// DATA
const meses=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];

const ventas=[99815,51731,110979,293804,66415,28404,381626,649979,365924,619432,303714,656114];

const compras=[50000,30000,70000,200000,50000,20000,250000,400000,200000,300000,150000,450000];

// CALCULOS
const totalVentas=ventas.reduce((a,b)=>a+b,0);
const totalCompras=compras.reduce((a,b)=>a+b,0);
const resultado=totalVentas-totalCompras;

// VARIACIONES (último mes vs anterior)
const varVentas=((ventas[11]-ventas[10])/ventas[10])*100;
const varCompras=((compras[11]-compras[10])/compras[10])*100;

const resMes=ventas.map((v,i)=>v-compras[i]);
const varResultado=((resMes[11]-resMes[10])/resMes[10])*100;

// FORMATO COLOR
function color(v){
    return v>=0 ? "#5BFF7A" : "#ff6b6b";
}

// MOSTRAR
document.getElementById("ventasTotal").innerText="$"+totalVentas.toLocaleString();
document.getElementById("comprasTotal").innerText="$"+totalCompras.toLocaleString();
document.getElementById("resultado").innerText="$"+resultado.toLocaleString();
document.getElementById("promedio").innerText="$"+Math.round(totalVentas/12).toLocaleString();

document.getElementById("varVentas").innerText=varVentas.toFixed(0)+"%";
document.getElementById("varVentas").style.color=color(varVentas);

document.getElementById("varCompras").innerText=varCompras.toFixed(0)+"%";
document.getElementById("varCompras").style.color=color(varCompras);

document.getElementById("varResultado").innerText=varResultado.toFixed(0)+"%";
document.getElementById("varResultado").style.color=color(varResultado);

// TABLA
const tabla=document.getElementById("tabla");

for(let i=0;i<meses.length;i++){
    let res=ventas[i]-compras[i];

    tabla.innerHTML+=`
    <tr>
        <td>${meses[i]}</td>
        <td>$${ventas[i].toLocaleString()}</td>
        <td>$${compras[i].toLocaleString()}</td>
        <td style="color:${res>=0?'#5BFF7A':'#ff6b6b'}">$${res.toLocaleString()}</td>
    </tr>`;
}

// CHARTS
new Chart(document.getElementById('chartComparativo'),{
    type:'bar',
    data:{
        labels:meses,
        datasets:[
        {label:'Ventas',data:ventas,backgroundColor:'#2E3F6E'},
        {label:'Compras',data:compras,backgroundColor:'#5BFF7A'}
        ]
    }
});

new Chart(document.getElementById('chartResultado'),{
    type:'line',
    data:{
        labels:meses,
        datasets:[{
            label:'Resultado',
            data:resMes,
            borderColor:'#5BFF7A',
            fill:true,
            backgroundColor:'rgba(91,255,122,0.2)'
        }]
    }
});

</script>

</body>
</html>
